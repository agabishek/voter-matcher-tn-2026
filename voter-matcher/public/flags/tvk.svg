<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- TVK Election Symbol: Whistle (விசில்) - ECI allotted Jan 2026 -->
  <rect width="100" height="100" fill="#FFFFFF"/>
  
  <!-- Whistle body -->
  <g transform="translate(50,50)">
    <!-- Main barrel -->
    <rect x="-30" y="-8" width="40" height="16" rx="3" fill="#333"/>
    
    <!-- Mouthpiece (tapered end) -->
    <path d="M-30,-6 L-42,-4 L-42,4 L-30,6Z" fill="#444"/>
    <rect x="-44" y="-3" width="6" height="6" rx="2" fill="#555"/>
    
    <!-- Sound chamber (round end) -->
    <circle cx="14" cy="0" r="14" fill="#333"/>
    <circle cx="14" cy="0" r="11" fill="#444"/>
    
    <!-- Sound hole/slit -->
    <rect x="8" y="-10" width="12" height="3" rx="1.5" fill="#222"/>
    
    <!-- Air window on top -->
    <rect x="-10" y="-10" width="14" height="3" rx="1.5" fill="#555"/>
    
    <!-- Ring/loop for lanyard -->
    <circle cx="-36" cy="-10" r="5" fill="none" stroke="#666" stroke-width="2.5"/>
    
    <!-- Cork/pea bump inside -->
    <circle cx="14" cy="0" r="4" fill="#666"/>
    
    <!-- Highlight/shine -->
    <ellipse cx="-15" cy="-5" rx="8" ry="2" fill="rgba(255,255,255,0.15)"/>
  </g>
  
  <!-- Border -->
  <rect width="100" height="100" fill="none" stroke="#457B9D" stroke-width="3" rx="4"/>
</svg>